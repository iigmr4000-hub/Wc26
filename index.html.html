function formatCountdown(ms) {
  if (ms <= 0) return null;
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  if (d > 0) return `${d}ي ${h}س ${m}د`;
  if (h > 0) return `${h}س ${m}د ${s}ث`;
  return `${m}د ${s}ث`;
}

function formatTime(isoStr) {
  if (!isoStr) return "";
  const d = new Date(isoStr);
  return d.toLocaleTimeString("ar-SA", { hour:"2-digit", minute:"2-digit", hour12:true });
}

function formatPredTime(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "الآن";
  if (mins < 60) return `منذ ${mins} دقيقة`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `منذ ${hrs} ساعة`;
  return d.toLocaleDateString("ar-SA", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });
}

}

function ScoreBox({ value, onChange, accent, disabled }) {
  const col = accent || "#C8A84B";
  return (
    <input type="number" min="0" max="20" disabled={disabled}
      value={value===null||value===undefined?"":value}
      onChange={e=>onChange(e.target.value===""?null:parseInt(e.target.value))}
      placeholder="-"
      style={{ width:46,height:46,borderRadius:10,border:`2px solid ${disabled?"rgba(255,255,255,0.08)":col+"55"}`,
        background:disabled?"rgba(255,255,255,0.03)":`${col}12`,
        color:disabled?"rgba(255,255,255,0.25)":"#fff",fontSize:20,fontFamily:"inherit",
        textAlign:"center",outline:"none",fontWeight:700,transition:"all 0.2s",
        cursor:disabled?"not-allowed":"text" }}
      onFocus={e=>{ if(!disabled){e.target.style.border=`2px solid ${col}`;e.target.style.background=`${col}22`;} }}
      onBlur={e=>{ if(!disabled){e.target.style.border=`2px solid ${col}55`;e.target.style.background=`${col}12`;} }}
    />
  );
}

function ResetButton({ onReset }) {
  const [step, setStep] = useState(0); // 0=idle 1=confirm 2=done
  useEffect(() => {
    if (step === 0) return;
    const t = setTimeout(() => setStep(0), 4000);
    return () => clearTimeout(t);
  }, [step]);

  if (step === 0) return (
    <button className="danger" style={{ fontSize:13,padding:"9px 18px" }}
      onClick={()=>setStep(1)}>
      🗑️ مسح كل البيانات
    </button>
  );
  if (step === 1) return (
    <div style={{ display:"flex",gap:8,alignItems:"center",flexWrap:"wrap" }}>
      <div style={{ fontSize:12,color:"#EF4444",fontWeight:700 }}>متأكد؟ هذا الإجراء لا يمكن التراجع عنه</div>
      <button style={{ background:"#EF4444",border:"none",color:"#fff",fontFamily:"inherit",fontSize:13,fontWeight:900,padding:"9px 18px",borderRadius:10,cursor:"pointer" }}
        onClick={()=>{ onReset(); setStep(2); }}>
        نعم، امسح كل شيء
      </button>
      <button className="ghost" style={{ fontSize:12,padding:"8px 14px" }} onClick={()=>setStep(0)}>إلغاء</button>
    </div>
  );
  return <div style={{ fontSize:13,color:"#7DC364",fontWeight:700 }}>✓ تم المسح بنجاح</div>;
}

                        <ScoreBox value={act.home} onChange={v=>setActual(m.id,"home",v)} accent={grpColor}/>

              }).sort((a,b) => {

                <div style={{ textAlign:"center",padding:"50px 0",color:"rgba(255,255,255,0.2)" }}>

          <div>
            {players.length >= 2 && (() => {
              const sorted = [...players].sort((a,b)=>getScore(b.id)-getScore(a.id));

            {[...players].sort((a,b)=>getScore(b.id)-getScore(a.id)).map((p,i)=>{

              const acc = resolved>0?Math.round(correct/resolved*100):0;
              // show prediction timestamps
              const recentPreds = Object.entries(predictions[p.id]||{})
                .filter(([,v])=>v.ts)
                .sort((a,b)=>b[1].ts-a[1].ts)
                .slice(0,1);

              return (
                <div key={p.id} style={{ background:i===0?"rgba(200,168,75,0.05)":"rgba(255,255,255,0.03)",border:`1px solid ${i===0?"rgba(200,168,75,0.3)":"rgba(255,255,255,0.07)"}`,borderRadius:16,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12,animation:`fadeIn 0.4s ease ${i*0.07}s both` }} className="anim">

                    {/* Special bonuses */}
                    {(() => {
                      const sp2 = specialPreds[p.id]||{};
                      const sl2 = specialLocked[p.id]||{};
                      const champOk = sl2.champion && specialActual.champion && sp2.champion && sp2.champion.trim().toLowerCase()===specialActual.champion.trim().toLowerCase();
                      const scorOk  = sl2.scorer  && specialActual.scorer  && sp2.scorer  && sp2.scorer.trim().toLowerCase()===specialActual.scorer.trim().toLowerCase();

            {/* Danger zone — admin only */}
            {adminMode && (
              <div style={{ background:"rgba(239,68,68,0.04)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:14,padding:14,marginBottom:14 }}>
                <div style={{ fontSize:11,fontWeight:700,color:"#EF4444",marginBottom:8,letterSpacing:2 }}>⚠️ منطقة الخطر</div>
                <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:10 }}>مسح كل البيانات — التوقعات والنتائج — ولا يمكن التراجع</div>
                <ResetButton onReset={()=>{
                  fetch(`${SUPABASE_URL}/rest/v1/wc2026_store?key=eq.wc2026_data`, {
                  method: 'DELETE',
                  headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                }).catch(()=>{});
                  setPredictions({});
                  setActuals({});
                  setKoEdits({});
                  setKoTimes({});
                  setExtraMatches([]);
                  setSpecialPreds({});
                  setSpecialLocked({});
                  setSpecialActual({ champion:"", scorer:"" });
                  setSpecialRevealed(false);
                }}/>
              </div>
            )}

            <div style={{ background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:14 }}>
              <div style={{ fontSize:11,color:"#C8A84B",fontWeight:700,letterSpacing:2,marginBottom:10 }}>💡 دليل الاستخدام</div>
              {["تبويب «القادمة»: شاهد المباراة القادمة مع عداد تنازلي وأدخل توقعك","التوقع ينغلق تلقائياً بمجرد بدء المباراة","يظهر وقت توقعك بجانب الرقم المدخل","المجموعات: للاطلاع فقط على تفاصيل المجموعات A–L","وضع الإدارة بكود سري لإدخال النتائج الفعلية"].map((s,i)=>(
                <div key={i} style={{ display:"flex",gap:10,marginBottom:8 }}>
                  <div style={{ width:20,height:20,borderRadius:"50%",background:"rgba(200,168,75,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,color:"#C8A84B",flexShrink:0 }}>{i+1}</div>
                  <div style={{ fontSize:12,color:"rgba(255,255,255,0.55)",lineHeight:1.6 }}>{s}</div>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
